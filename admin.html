<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKT Stores | Admin Dashboard</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #faf9f6; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-brand { background: #e8450a; color: white; transition: all 0.2s; }
        .btn-brand:hover { background: #c73a08; transform: translateY(-1px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-gray-900">SKT Admin</h1>
                <p class="text-sm text-gray-500 font-medium">Manage your products & inventory</p>
            </div>
            <button onclick="showModal()" class="btn-brand px-6 py-3 rounded-2xl font-bold shadow-lg shadow-orange-500/20">
                + Add Product
            </button>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-[24px] shadow-sm">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Total Products</p>
                <h3 id="stat-count" class="text-3xl font-black">0</h3>
            </div>
            <div class="glass p-6 rounded-[24px] shadow-sm">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Out of Stock</p>
                <h3 id="stat-stock" class="text-3xl font-black text-red-500">0</h3>
            </div>
            <div class="glass p-6 rounded-[24px] shadow-sm">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Categories</p>
                <h3 id="stat-cats" class="text-3xl font-black text-orange-500">0</h3>
            </div>
        </div>

        <!-- Table -->
        <div class="glass rounded-[32px] overflow-hidden shadow-xl border border-gray-100">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50/50">
                    <tr>
                        <th class="p-5 text-xs font-black text-gray-400 uppercase tracking-widest">Product</th>
                        <th class="p-5 text-xs font-black text-gray-400 uppercase tracking-widest">Category</th>
                        <th class="p-5 text-xs font-black text-gray-400 uppercase tracking-widest">Price</th>
                        <th class="p-5 text-xs font-black text-gray-400 uppercase tracking-widest">Stock</th>
                        <th class="p-5 text-xs font-black text-gray-400 uppercase tracking-widest">Actions</th>
                    </tr>
                </thead>
                <tbody id="product-list" class="divide-y divide-gray-100">
                    <!-- Loading state -->
                    <tr><td colspan="5" class="p-10 text-center text-gray-400 font-medium">Loading products...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] w-full max-w-lg p-8 shadow-2xl scale-in animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-black">Add New Product</h2>
                <button onclick="hideModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="product-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Unique ID</label>
                        <input type="text" id="p-id" placeholder="pizza-marg" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Emoji</label>
                        <input type="text" id="p-emoji" placeholder="🍕" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Name</label>
                    <input type="text" id="p-name" placeholder="Margherita Pizza" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Category</label>
                        <select id="p-cat" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                            <option value="Pizza">Pizza</option>
                            <option value="Burger">Burger</option>
                            <option value="Sides">Sides</option>
                            <option value="Drinks">Drinks</option>
                            <option value="Desserts">Desserts</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Tag (Optional)</label>
                        <input type="text" id="p-tag" placeholder="Hot & Fresh" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Price ($)</label>
                        <input type="number" step="0.01" id="p-price" placeholder="9.99" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Stock Qty</label>
                        <input type="number" id="p-stock" placeholder="50" class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Image URL</label>
                    <input type="url" id="p-img" placeholder="https://..." class="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                </div>

                <button type="submit" id="submit-btn" class="w-full btn-brand py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-orange-500/20 mt-4">
                    Save Product
                </button>
            </form>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://rdzrqbnqzhqzggtabrqw.supabase.co';
        const SERVICE_ROLE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkenJxYm5xemhxemdndGFicnF3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzYxMjA5NywiZXhwIjoyMDkzMTg4MDk3fQ.Ka1PGk9x4xII7x-q3c4pnPly8GYdyN1sjpRYJwyQ3Tg';
        const SITE_URL = 'https://sktstores.vercel.app/auth';

        const client = supabase.createClient(SUPABASE_URL, SERVICE_ROLE_KEY);
        let products = [];

        // --- AUTH (Simple protection) ---
        let isAdmin = false;
        const pass = localStorage.getItem('admin_pass') || prompt("Enter Admin Password:");
        if (pass === "admin123") { 
            localStorage.setItem('admin_pass', 'admin123');
            isAdmin = true;
        } else {
            document.body.innerHTML = "<div class='h-screen flex items-center justify-center font-black text-2xl flex-col gap-4'>Access Denied <button onclick='location.reload()' class='text-sm bg-orange-500 text-white px-4 py-2 rounded-xl'>Try Again</button></div>";
        }

        // --- INITIAL FETCH ---
        async function loadProducts() {
            const { data, error } = await client
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                alert("Error loading products");
                return;
            }

            products = data;
            renderProducts();
            updateStats();
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            if (products.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400 font-medium">No products found. Add your first one!</td></tr>`;
                return;
            }

            list.innerHTML = products.map(p => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="p-5">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl bg-gray-100 w-10 h-10 flex items-center justify-center rounded-xl">${p.emoji || '🍔'}</span>
                            <div>
                                <div class="font-black text-gray-900">${p.name}</div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${p.id}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-5 font-bold text-gray-500 text-sm">${p.category}</td>
                    <td class="p-5 font-black text-gray-900">$${Number(p.price).toFixed(2)}</td>
                    <td class="p-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${p.stock > 10 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${p.stock} in stock
                        </span>
                    </td>
                    <td class="p-5">
                        <div class="flex gap-2">
                            <button onclick="editProduct('${p.id}')" class="p-2 hover:bg-blue-50 text-blue-500 rounded-lg transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deleteProduct('${p.id}')" class="p-2 hover:bg-red-50 text-red-500 rounded-lg transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById('stat-count').innerText = products.length;
            document.getElementById('stat-stock').innerText = products.filter(p => p.stock <= 0).length;
            document.getElementById('stat-cats').innerText = new Set(products.map(p => p.category)).size;
        }

        // --- ACTIONS ---
        const form = document.getElementById('product-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Saving...";

            const id = document.getElementById('p-id').value;
            const editId = document.getElementById('edit-id').value;

            const payload = {
                id: id,
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                emoji: document.getElementById('p-emoji').value,
                tag: document.getElementById('p-tag').value,
                img: document.getElementById('p-img').value,
            };

            let error;
            if (editId) {
                const { error: err } = await client.from('products').update(payload).eq('id', editId);
                error = err;
            } else {
                const { error: err } = await client.from('products').insert([payload]);
                error = err;
            }

            if (error) {
                alert("Error saving: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Save Product";
            } else {
                hideModal();
                loadProducts();
            }
        });

        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product?")) return;
            const { error } = await client.from('products').delete().eq('id', id);
            if (error) alert("Error deleting: " + error.message);
            else loadProducts();
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            
            document.getElementById('modal-title').innerText = "Edit Product";
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-id').disabled = true; // Cannot change ID on edit
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-emoji').value = p.emoji || '';
            document.getElementById('p-tag').value = p.tag || '';
            document.getElementById('p-img').value = p.img || '';
            
            showModal();
        }

        // --- UI HELPERS ---
        function showModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
            form.reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('p-id').disabled = false;
            document.getElementById('modal-title').innerText = "Add New Product";
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "Save Product";
        }

        // Run on start
        loadProducts();
    </script>
</body>
</html>
